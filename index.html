<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>随机聊天</title>
<style>
body{background:#111;color:#fff;font-family:Arial;margin:0;padding:0;}
#wrap{max-width:420px;margin:30px auto;padding:20px;}
h1{text-align:center;}
.btn{display:block;width:100%;padding:12px;background:#007bff;color:#fff;border:none;border-radius:8px;font-size:16px;margin:10px 0;}
.btn:disabled{background:#555;}
#chatBox{height:300px;background:#222;padding:10px;border-radius:8px;overflow:auto;margin:10px 0;}
.msg{margin:8px 0;padding:8px;border-radius:6px;}
.me{background:#007bff;text-align:right;}
.other{background:#333;}
#inputArea{display:flex;gap:8px;}
#input{flex:1;padding:10px;background:#222;border:1px solid #444;color:#fff;border-radius:8px;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;}
.modal-content{background:#222;padding:20px;border-radius:10px;width:90%;max-width:360px;}
.pay-btn{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px;font-size:16px;}
.pay5{background:#28a745;color:#fff;}
.pay15{background:#ffc107;color:#000;}
.pay30{background:#dc3545;color:#fff;}
</style>
</head>
<body>
<div id="wrap">
  <h1>随机匹配聊天</h1>
  <div>剩余次数：<span id="leftCount">3</span></div>
  <button class="btn" id="startBtn">开始匹配</button>
  <button class="btn" id="cancelBtn" style="display:none">取消匹配</button>

  <div id="chatBox"></div>

  <div id="inputArea" style="display:none">
    <input id="input" placeholder="输入消息（最多30字）">
    <button class="btn" id="sendBtn">发送</button>
  </div>

  <button class="btn" id="leaveBtn" style="display:none">离开对话</button>
</div>

<!-- 支付弹窗 -->
<div class="modal" id="payModal" style="display:none">
  <div class="modal-content">
    <h2>次数用完，请解锁</h2>
    <button class="pay-btn pay5" data-price="5">5元 - 当日无限</button>
    <button class="pay-btn pay15" data-price="15">15元 - 7天无限</button>
    <button class="pay-btn pay30" data-price="30">30元 - 30天无限</button>
    <button class="btn" id="closePay">关闭</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const startBtn=document.getElementById('startBtn');
const cancelBtn=document.getElementById('cancelBtn');
const chatBox=document.getElementById('chatBox');
const inputArea=document.getElementById('inputArea');
const input=document.getElementById('input');
const sendBtn=document.getElementById('sendBtn');
const leaveBtn=document.getElementById('leaveBtn');
const leftCountEl=document.getElementById('leftCount');
const payModal=document.getElementById('payModal');
const closePay=document.getElementById('closePay');
const payBtns=document.querySelectorAll('.pay-btn');

let userId='';

// 取权限
fetch('/user-auth?userId='+socket.id)
.then(r=>r.json())
.then(d=>{
  leftCountEl.textContent=d.freeToday;
  userId=socket.id;
});

startBtn.onclick=()=>{
  startBtn.style.display='none';
  cancelBtn.style.display='block';
  socket.emit('start_match');
};

cancelBtn.onclick=()=>{
  socket.emit('cancel_match');
};

leaveBtn.onclick=()=>{
  socket.emit('leave_chat');
};

sendBtn.onclick=()=>{
  const msg=input.value.trim();
  if(!msg||msg.length>30)return;
  socket.emit('send_message',msg);
  addMsg(msg,'me');
  input.value='';
};

function addMsg(text,type){
  const d=document.createElement('div');
  d.className='msg '+type;
  d.textContent=text;
  chatBox.appendChild(d);
  chatBox.scrollTop=chatBox.scrollHeight;
}

socket.on('waiting',()=>{
  addMsg('正在匹配...','other');
});

socket.on('match_success',()=>{
  chatBox.innerHTML='';
  addMsg('匹配成功！','other');
  cancelBtn.style.display='none';
  startBtn.style.display='none';
  inputArea.style.display='flex';
  leaveBtn.style.display='block';
});

socket.on('match_error',(e)=>{
  alert(e);
  payModal.style.display='flex';
});

socket.on('match_canceled',()=>{
  cancelBtn.style.display='none';
  startBtn.style.display='block';
  addMsg('已取消匹配','other');
});

socket.on('new_message',(d)=>{
  addMsg(d.msg,'other');
});

socket.on('chat_end',(t)=>{
  addMsg(t,'other');
  inputArea.style.display='none';
  leaveBtn.style.display='none';
  startBtn.style.display='block';
});

socket.on('user_leave',()=>{
  addMsg('对方离开','other');
  inputArea.style.display='none';
  leaveBtn.style.display='none';
  startBtn.style.display='block';
});

socket.on('left_count',(n)=>{
  leftCountEl.textContent=n;
});

// 支付
payBtns.forEach(btn=>{
  btn.onclick=()=>{
    const price=btn.getAttribute('data-price');
    fetch('/create-order',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({userId,price})
    })
    .then(r=>r.json())
    .then(d=>{
      window.location.href=d.payUrl;
    });
  };
});

closePay.onclick=()=>{
  payModal.style.display='none';
};
</script>
</body>
</html>
