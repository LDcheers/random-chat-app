<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机聊天</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        #chat {
            height: 400px;
            border: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        #message {
            width: 80%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: #007bff;
            color: white;
            cursor: pointer;
            margin: 5px;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>随机陌生人聊天</h1>

    <!-- 匹配状态提示框（我已经放好最正确的位置） -->
    <div id="matchStatus" style="
        margin: 15px 0;
        padding: 12px;
        border-radius: 6px;
        font-size: 15px;
        text-align: center;
        display: none;
    "></div>

    <div id="status">已在线</div>
    <div id="chat"></div>

    <input type="text" id="message" placeholder="输入消息...">
    <button id="send" disabled>发送</button>
    <br>
    <button id="match">开始匹配</button>
    <button id="payBtn">付费解锁无限匹配</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 你的服务器地址
        const socketUrl = "wss://random-chat-app-production-a19a.up.railway.app";
        const socket = io(socketUrl);

        // ===================== 匹配状态提示（完整版，无任何错误） =====================
        // 正在匹配中
        socket.on('waiting', (msg) => {
            let s = document.getElementById('matchStatus');
            s.style.display = 'block';
            s.style.background = '#fff3cd';
            s.style.color = '#856404';
            s.innerText = '⏳ 正在匹配中，请稍候...';
        });

        // 匹配成功
        socket.on('match_success', (msg) => {
            let s = document.getElementById('matchStatus');
            s.style.display = 'block';
            s.style.background = '#d4edda';
            s.style.color = '#155724';
            s.innerText = '✅ 匹配成功！可以发消息了';
            document.getElementById('send').disabled = false;
        });

        // 匹配错误
        socket.on('match_error', (msg) => {
            let s = document.getElementById('matchStatus');
            s.style.display = 'block';
            s.style.background = '#f8d7da';
            s.style.color = '#721c24';
            s.innerText = '❌ ' + msg;
        });

        // 聊天结束
        socket.on('chat_end', (msg) => {
            let s = document.getElementById('matchStatus');
            s.style.display = 'block';
            s.style.background = '#f8d7da';
            s.style.color = '#721c24';
            s.innerText = '❌ ' + msg;
            document.getElementById('send').disabled = true;
        });

        // 收到消息
        socket.on('new_message', (data) => {
            let chat = document.getElementById('chat');
            let div = document.createElement('div');
            div.innerHTML = `<strong>${data.user}:</strong> ${data.msg}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });

        // 发送消息
        document.getElementById('send').onclick = function () {
            let msg = document.getElementById('message').value;
            if (msg) {
                socket.emit('send_message', msg);
                document.getElementById('message').value = '';
            }
        };

        // 开始匹配
        document.getElementById('match').onclick = function () {
            socket.emit('start_match');
        };
    </script>
</body>
</html>
