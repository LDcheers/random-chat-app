<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机聊天</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #ebebeb;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 22px;
        }
        #status {
            text-align: center;
            margin-bottom: 10px;
            color: #666;
        }
        #matchStatus {
            margin: 15px 0;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            text-align: center;
            display: none;
        }

        #chat {
            height: 450px;
            border: 1px solid #ddd;
            padding: 15px;
            overflow-y: auto;
            background: #fff;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
        }
        .mine {
            justify-content: flex-end;
        }
        .other {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }
        .mine .bubble {
            background: #00C260;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .other .bubble {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }

        .msgCount {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }
        .other .msgCount {
            text-align: left;
        }

        .input-area {
            display: flex;
            gap: 8px;
        }
        #message {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #ddd;
            outline: none;
        }
        button {
            padding: 12px 16px;
            border: none;
            border-radius: 20px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        button:disabled {
            background: #ccc;
        }
        .btn-group {
            margin-top: 10px;
            text-align: center;
        }
        .btn-group button + button {
            margin-left: 8px;
        }

        /* 付费弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }
        .package {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            cursor: pointer;
        }
        .package:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>

    <h1>随机陌生人聊天</h1>
    <div id="matchStatus"></div>
    <div id="status">✅ 已在线</div>
    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="message" placeholder="输入消息...">
        <button id="send" disabled>发送</button>
    </div>

    <div class="btn-group">
        <button id="matchBtn">开始匹配（今日剩余3次）</button>
        <button id="leaveBtn" style="background:#f44336;display:none">离开对话</button>
        <button id="payBtn">付费解锁</button>
    </div>

    <!-- 付费套餐弹窗 -->
    <div id="payModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 style="text-align:center;margin-bottom:15px">选择付费套餐</h2>
            <div class="package" data-price="9.9">
                <strong>9.9元</strong> - 当日无限匹配
            </div>
            <div class="package" data-price="29.9">
                <strong>29.9元</strong> - 7天无限匹配
            </div>
            <div class="package" data-price="99">
                <strong>99元</strong> - 永久无限匹配
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socketUrl = "wss://random-chat-app-production-a19a.up.railway.app";
        const socket = io(socketUrl);

        let myMsgCount = 0;
        let otherMsgCount = 0;
        let isOtherOnline = false;
        let isMatching = false;

        const matchBtn = document.getElementById('matchBtn');
        const leaveBtn = document.getElementById('leaveBtn');
        const payModal = document.getElementById('payModal');

        // 剩余次数
        socket.on('left_count', (n) => {
            matchBtn.innerText = `开始匹配（今日剩余${n}次）`;
        });

        // 正在匹配
        socket.on('waiting', () => {
            isMatching = true;
            matchBtn.innerText = "取消匹配";
            let st = document.getElementById('matchStatus');
            st.style.display = 'block';
            st.style.background = '#fff3cd';
            st.style.color = '#856404';
            st.innerText = '⏳ 正在匹配中，可以随时取消';
        });

        // 匹配成功
        socket.on('match_success', () => {
            isMatching = false;
            matchBtn.innerText = "开始匹配";
            let st = document.getElementById('matchStatus');
            st.style.display = 'block';
            st.style.background = '#d4edda';
            st.style.color = '#155724';
            st.innerText = '✅ 匹配成功！开始聊天';
            document.getElementById('send').disabled = false;
            leaveBtn.style.display = 'inline-block';
            isOtherOnline = true;
            updateStatus();
        });

        // 匹配取消
        socket.on('match_canceled', () => {
            isMatching = false;
            matchBtn.innerText = "开始匹配";
            document.getElementById('matchStatus').style.display = 'none';
        });

        // 匹配错误
        socket.on('match_error', (msg) => {
            isMatching = false;
            matchBtn.innerText = "开始匹配";
            let st = document.getElementById('matchStatus');
            st.style.display = 'block';
            st.style.background = '#f8d7da';
            st.style.color = '#721c24';
            st.innerText = '❌ ' + msg;
        });

        // 聊天结束
        socket.on('chat_end', (msg) => {
            let st = document.getElementById('matchStatus');
            st.style.display = 'block';
            st.style.background = '#f8d7da';
            st.style.color = '#721c24';
            st.innerText = '❌ ' + msg;
            document.getElementById('send').disabled = true;
            leaveBtn.style.display = 'none';
            // 重置离线提示
            isOtherOnline = false;
            resetStatusToOnline();
        });

        // 对方离线
        socket.on('user_leave', () => {
            isOtherOnline = false;
            updateStatus();
        });

        function updateStatus() {
            let dom = document.getElementById('status');
            if (isOtherOnline) {
                dom.innerText = "✅ 对方在线";
                dom.style.color = "#00C260";
            } else {
                dom.innerText = "⚠️ 对方已离线";
                dom.style.color = "#f44336";
            }
        }

        // 结束对话后重置为「已在线」
        function resetStatusToOnline() {
            let dom = document.getElementById('status');
            dom.innerText = "✅ 已在线";
            dom.style.color = "#666";
        }

        // 收到消息
        socket.on('new_message', (data) => {
            let chat = document.getElementById('chat');
            let isMe = data.user === socket.id;

            let msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isMe ? 'mine' : 'other');

            let bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = data.msg;

            let count = document.createElement('div');
            count.className = 'msgCount';

            if (isMe) {
                myMsgCount++;
                count.innerText = `我 · 第 ${myMsgCount} 条`;
            } else {
                otherMsgCount++;
                count.innerText = `对方 · 第 ${otherMsgCount} 条`;
            }

            msgDiv.appendChild(bubble);
            msgDiv.appendChild(count);
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        });

        // 发送
        document.getElementById('send').onclick = function () {
            let msg = document.getElementById('message').value.trim();
            if (msg) {
                socket.emit('send_message', msg);
                document.getElementById('message').value = '';
            }
        };

        // 匹配/取消
        matchBtn.onclick = function () {
            if (!isMatching) {
                myMsgCount = 0;
                otherMsgCount = 0;
                document.getElementById('chat').innerHTML = '';
                socket.emit('start_match');
            } else {
                socket.emit('cancel_match');
            }
        };

        // 离开对话
        leaveBtn.onclick = function () {
            socket.emit('leave_chat');
            document.getElementById('matchStatus').innerText = '❌ 你已离开对话';
            document.getElementById('send').disabled = true;
            leaveBtn.style.display = 'none';
            isOtherOnline = false;
            resetStatusToOnline();
        };

        // 付费弹窗
        document.getElementById('payBtn').onclick = function () {
            payModal.style.display = 'flex';
        };
        document.querySelector('.close-modal').onclick = function () {
            payModal.style.display = 'none';
        };
        // 点击套餐（目前只alert，以后接支付）
        document.querySelectorAll('.package').forEach(pkg => {
            pkg.onclick = function () {
                let price = this.getAttribute('data-price');
                alert(`你选择了 ${price} 元套餐，后续对接支付即可`);
                payModal.style.display = 'none';
            };
        });
    </script>
</body>
</html>
