<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BlindTouch</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    body{background:#08080a;color:#e6edf7;padding:16px;line-height:1.5}
    .container{max-width:420px;margin:0 auto;position:relative}
    .header{text-align:center;margin:24px 0 20px}
    .logo{font-size:28px;font-weight:600;color:#c9d8f0;letter-spacing:2px}

    .btn{width:100%;padding:15px;border-radius:16px;border:none;background:#202838;color:#b8d0f0;font-size:16px;font-weight:500;margin:10px 0;cursor:pointer;transition:all 0.2s ease;box-shadow:0 0 8px rgba(120,160,230,0.15)}
    .btn:active{transform:scale(0.98);opacity:0.9}
    .btn:disabled{background:#141820;color:#4a5568;box-shadow:none;transform:none;cursor:not-allowed}

    .status{text-align:center;color:#8998b3;margin:10px 0;font-size:15px}
    .chat-box{height:460px;background:#101218;border-radius:18px;padding:16px;overflow-y:auto;margin:12px 0;box-shadow:inset 0 0 12px rgba(0,0,0,0.6)}
    .chat-box::-webkit-scrollbar{width:4px}
    .chat-box::-webkit-scrollbar-thumb{background:#252c3a;border-radius:4px}

    .input-row{display:flex;gap:10px;margin-top:12px}
    .input-row input{flex:1;padding:14px 16px;border-radius:16px;border:none;background:#141824;color:#d0dcec;outline:none;transition:all 0.2s ease}
    .input-row input:focus{background:#181c28;box-shadow:0 0 6px rgba(120,160,230,0.2)}

    .right-bar{position:fixed;top:50%;right:10px;transform:translateY(-50%);width:140px;background:#10121a;border-radius:16px;padding:14px;box-shadow:0 0 10px rgba(100,140,220,0.12)}
    .right-bar h4{text-align:center;margin-bottom:10px;font-size:14px;color:#a1b4d8}
    .right-bar textarea{width:100px;height:100px;background:#141824;border:none;border-radius:10px;color:#c9d8f0;padding:8px;outline:none;resize:none;font-size:13px}
    .bar-btn{width:100px;padding:6px;border-radius:8px;border:none;margin-top:8px;font-size:13px;background:#202838;color:#b8d0f0;cursor:pointer;box-shadow:0 0 6px rgba(120,160,230,0.15)}
    .bar-btn:active{opacity:0.9}

    .vip-group{margin-top:24px}
    .vip-title{font-size:16px;margin-bottom:12px;color:#a1b4d8}
    .vip-item{background:#141824;border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all 0.2s ease}
    .vip-item:active{background:#181e2b}
    .vip-name{font-weight:500;margin-bottom:4px;color:#c9d8f0}
    .vip-price{color:#82b1f0;font-weight:500}

    .chat-number{font-size:11px;color:#6b7a95;margin-bottom:4px}

    .vip-menu{position:absolute;top:10px;right:0;z-index:888}
    .vip-dropdown{display:none;position:absolute;top:42px;right:0;width:180px;background:#10121a;border-radius:16px;padding:12px;box-shadow:0 0 12px rgba(80,120,200,0.15)}
    .vip-menu-btn{background:#202838;color:#b8d0f0;border:none;padding:8px 14px;border-radius:12px;cursor:pointer;font-size:14px;transition:all 0.2s ease;box-shadow:0 0 6px rgba(120,160,230,0.15)}
    .vip-menu-btn:active{transform:scale(0.96)}
    .vip-menu.show .vip-dropdown{display:block}

    .mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:999}
    .login-box{width:90%;max-width:360px;background:#10121a;border-radius:20px;padding:28px;box-shadow:0 0 15px rgba(80,120,200,0.12)}
    .login-box h3{text-align:center;margin-bottom:24px;font-size:20px;font-weight:600;color:#c9d8f0}
    .login-box input{width:100%;padding:14px;border-radius:14px;border:none;background:#141824;color:#d0dcec;margin-bottom:16px;outline:none;transition:all 0.2s ease}
    .login-box input:focus{background:#181e2b;box-shadow:0 0 6px rgba(120,160,230,0.2)}
    .switch-txt{text-align:center;margin-top:18px;color:#6b7a95;font-size:14px}
    .switch-txt span{color:#82b1f0;cursor:pointer}
    .hide{display:none !important}

    .send-contact{padding:14px 10px;border-radius:16px;border:none;background:#1a2230;color:#96b8e8;font-size:14px;cursor:pointer;box-shadow:0 0 6px rgba(100,150,220,0.12)}
    .send-contact:disabled{background:#12161e;color:#3a475e;cursor:not-allowed;box-shadow:none}
  </style>
</head>
<body>

<div class="right-bar">
  <h4>我的联系方式</h4>
  <textarea id="contactTxt" placeholder="输入微信/QQ/手机号"></textarea>
  <button class="bar-btn" id="saveContact">保存</button>
  <button class="bar-btn" id="clearContact" style="background:#141824">清空</button>
</div>

<div class="mask" id="mask">
  <div class="login-box">
    <h3 id="winTitle">登录</h3>
    <input type="text" id="username" placeholder="请输入账号">
    <input type="password" id="pwd" placeholder="请输入密码">
    <button class="btn" id="submitBtn">立即登录</button>
    <div class="switch-txt" id="switchTxt">没有账号？<span id="switchBtn">去注册</span></div>
  </div>
</div>

<div class="container" id="mainPage" class="hide">
  <div class="header">
    <div class="logo">BlindTouch</div>
  </div>

  <div class="vip-menu" id="vipMenu">
    <button class="vip-menu-btn" id="vipBtn">💎 充值</button>
    <div class="vip-dropdown">
      <div class="vip-item" data-price="5"><div class="vip-name">1天会员</div><div class="vip-price">¥5</div></div>
      <div class="vip-item" data-price="15"><div class="vip-name">7天会员</div><div class="vip-price">¥15</div></div>
      <div class="vip-item" data-price="30"><div class="vip-name">30天会员</div><div class="vip-price">¥30</div></div>
    </div>
  </div>

  <div class="status" id="status">未匹配</div>
  <div class="status" id="left">免费次数：3</div>

  <button class="btn" id="match">开始匹配</button>
  <button class="btn" id="leave" disabled>结束聊天</button>

  <div class="chat-box" id="chat"></div>

  <div class="input-row">
    <input id="msg" placeholder="输入消息..." maxlength="50" disabled>
    <button class="btn" id="send" disabled>发送</button>
    <button class="send-contact" id="sendContact" disabled>发送联系方式</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let nowMode = "login";
  let loginUsername = "";
  
  let matching = false;
  let myMsgCount = 0;
  let otherMsgCount = 0;
  const MAX_SINGLE_LIMIT = 20;
  const NEED_MIN = 5;
  const MAX_CHAR = 50;

  const mask = document.getElementById('mask');
  const mainPage = document.getElementById('mainPage');
  const winTitle = document.getElementById('winTitle');
  const submitBtn = document.getElementById('submitBtn');
  const switchBtn = document.getElementById('switchBtn');
  const switchTxt = document.getElementById('switchTxt');
  const usernameInp = document.getElementById('username');
  const pwdInp = document.getElementById('pwd');

  const status = document.getElementById('status');
  const left = document.getElementById('left');
  const matchBtn = document.getElementById('match');
  const leave = document.getElementById('leave');
  const chat = document.getElementById('chat');
  const msg = document.getElementById('msg');
  const send = document.getElementById('send');
  const sendContact = document.getElementById('sendContact');

  const contactTxt = document.getElementById('contactTxt');
  const saveContact = document.getElementById('saveContact');
  const clearContact = document.getElementById('clearContact');

  const vipMenu = document.getElementById('vipMenu');
  const vipBtn = document.getElementById('vipBtn');
  
  vipBtn.onclick = () => {
    vipMenu.classList.toggle('show');
  };

  document.addEventListener('click',(e)=>{
    if(!vipMenu.contains(e.target)){
      vipMenu.classList.remove('show');
    }
  });

  window.onload = function(){
    let user = localStorage.getItem('btUser');
    let myContact = localStorage.getItem('myContact') || '';
    contactTxt.value = myContact;
    if(user){ enterMain(JSON.parse(user).username); }
  };

  saveContact.onclick = () => {
    localStorage.setItem('myContact', contactTxt.value.trim());
    alert('联系方式已保存');
  };
  clearContact.onclick = () => {
    contactTxt.value = '';
    localStorage.removeItem('myContact');
  };

  switchBtn.onclick = function(){
    if(nowMode === "login"){
      nowMode = "reg";
      winTitle.innerText = "注册账号";
      submitBtn.innerText = "立即注册";
      switchTxt.innerHTML = "已有账号？<span id='switchBtn'>去登录</span>";
      document.getElementById('switchBtn').onclick = switchBtn.onclick;
    }else{
      nowMode = "login";
      winTitle.innerText = "登录";
      submitBtn.innerText = "立即登录";
      switchTxt.innerHTML = "没有账号？<span id='switchBtn'>去注册</span>";
      document.getElementById('switchBtn').onclick = switchBtn.onclick;
    }
  };

  submitBtn.onclick = async function(){
    let un = usernameInp.value.trim();
    let pd = pwdInp.value.trim();
    if(!un || !pd){
      alert('账号和密码不能为空');
      return;
    }

    let url = nowMode === "reg" ? '/register' : '/login';
    let res = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: un, password: pd})
    });
    let data = await res.json();

    if(data.code !== 0){
      alert(data.msg || '操作失败');
      return;
    }

    if(nowMode === "login"){
      loginUsername = un;
      localStorage.setItem('btUser', JSON.stringify({username: un}));
      enterMain(un);
    }else{
      alert('注册成功，请登录');
      nowMode = "login";
      winTitle.innerText = "登录";
      submitBtn.innerText = "立即登录";
      switchTxt.innerHTML = "没有账号？<span id='switchBtn'>去注册</span>";
      document.getElementById('switchBtn').onclick = switchBtn.onclick;
    }
  };

  async function enterMain(un){
    mask.classList.add('hide');
    mainPage.classList.remove('hide');
    let res = await fetch('/getAccountUser?username=' + un);
    let data = await res.json();
    let isVip = data.expireTime > Date.now();
    left.innerText = `免费次数：${data.freeToday} ${isVip ? '（已开通会员）' : ''}`;
  }

  matchBtn.onclick = () => {
    if(!matching){
      matching = true;
      matchBtn.innerText = "停止匹配";
      status.innerText = "正在匹配...";
      socket.emit('start_match');
    }else{
      matching = false;
      socket.emit('cancel_match');
      reset();
    }
  };

  leave.onclick = () => {
    socket.emit('leave_chat');
    reset();
  };

  send.onclick = () => {
    let t = msg.value.trim();
    if(!t) return;
    if(t.length > MAX_CHAR){
      alert(`单条消息不能超过${MAX_CHAR}个字符`);
      return;
    }
    if(myMsgCount >= MAX_SINGLE_LIMIT){
      alert('你已达到本轮20句发言上限');
      return;
    }
    myMsgCount++;
    addMsg(t, true, myMsgCount);
    socket.emit('send_message', t);
    msg.value = '';
    checkContactBtn();
  };

  sendContact.onclick = () => {
    let cont = localStorage.getItem('myContact') || '';
    if(!cont){
      alert('请先在右侧填写并保存你的联系方式');
      return;
    }
    let sendStr = '我的联系方式：' + cont;
    if(sendStr.length > MAX_CHAR){
      alert('联系方式过长，单条消息不能超过50个字符');
      return;
    }
    if(myMsgCount >= MAX_SINGLE_LIMIT){
      alert('你已达到本轮20句发言上限');
      return;
    }
    myMsgCount++;
    addMsg(sendStr, true, myMsgCount);
    socket.emit('send_message', sendStr);
    checkContactBtn();
  };

  function checkContactBtn(){
    sendContact.disabled = (myMsgCount + otherMsgCount) < NEED_MIN;
  }

  // 气泡提亮 增强荧光发光 贴近你参考图
  function addMsg(text, isMe, count){
    let wrap = document.createElement('div');
    wrap.style.margin = '10px 0';

    let num = document.createElement('div');
    num.className = 'chat-number';
    num.innerText = `第${count}句`;

    let bubble = document.createElement('div');
    bubble.style.padding = '12px 16px';
    bubble.style.borderRadius = '18px';
    bubble.style.maxWidth = '75%';
    bubble.style.wordBreak = 'break-word';

    if(isMe){
      bubble.style.background = '#23344f';
      bubble.style.color = '#e0ecfa';
      bubble.style.boxShadow = '0 0 14px rgba(140,190,255,0.35)';
      bubble.style.marginLeft = 'auto';
    }else{
      bubble.style.background = '#1a273b';
      bubble.style.color = '#d0dff5';
      bubble.style.boxShadow = '0 0 14px rgba(110,160,230,0.3)';
    }
    bubble.innerText = text;

    wrap.appendChild(num);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function reset(){
    matching = false;
    matchBtn.disabled = false;
    matchBtn.innerText = "开始匹配";
    leave.disabled = true;
    msg.disabled = true;
    send.disabled = true;
    chat.innerHTML = '';
    status.innerText = '未匹配';
    myMsgCount = 0;
    otherMsgCount = 0;
    sendContact.disabled = true;
  }

  socket.on('waiting', () => status.innerText = '正在匹配...');
  socket.on('match_error', (t) => { alert(t); reset(); });

  // 匹配成功：锁定匹配按钮 禁止再点
  socket.on('match_success', () => {
    status.innerText = '匹配成功';
    // 关键：匹配成功直接禁用匹配按钮
    matchBtn.disabled = true;
    leave.disabled = false;
    msg.disabled = false;
    send.disabled = false;
    sendContact.disabled = true;
  });

  // 修复对方收不到消息：正常渲染文本
  socket.on('new_message', (txt) => {
    if(otherMsgCount >= MAX_SINGLE_LIMIT) return;
    otherMsgCount++;
    addMsg(txt, false, otherMsgCount);
    checkContactBtn();
  });

  socket.on('chat_end', () => { alert('对方已离开'); reset(); });
  socket.on('user_leave', () => { alert('对方断开'); reset(); });
  socket.on('left_count', (n) => left.innerText = '免费次数：' + n);

  document.querySelectorAll('.vip-item').forEach(item => {
    item.onclick = async () => {
      let price = item.dataset.price;
      let res = await fetch('/create-order', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({userId: loginUsername, price})
      });
      let data = await res.json();
      let f = document.createElement('form');
      f.method = 'POST';
      f.action = data.formUrl;
      f.target = '_blank';
      for(let k in data.formData){
        let i = document.createElement('input');
        i.type = 'hidden';
        i.name = k;
        i.value = data.formData[k];
        f.appendChild(i);
      }
      document.body.appendChild(f);
      f.submit();
      setTimeout(() => f.remove(), 500);
      vipMenu.classList.remove('show');
    };
  });
</script>
</body>
</html>
