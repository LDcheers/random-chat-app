<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlindTouch</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    body{background:#111;color:#fff;padding:20px}
    .container{max-width:420px;margin:0 auto}
    .header{text-align:center;margin:30px 0}
    .logo{font-size:28px;font-weight:bold;color:#fff;margin-bottom:10px}
    .tip{color:#888;font-size:14px}
    .btn{width:100%;padding:16px;border-radius:12px;border:none;background:#ff4080;color:#fff;font-size:16px;font-weight:500;margin:10px 0;cursor:pointer}
    .btn:disabled{background:#444;color:#777}
    .status{text-align:center;color:#aaa;margin:12px 0;font-size:15px}
    .chat-box{height:460px;background:#1a1a1a;border-radius:12px;padding:14px;overflow-y:auto;margin:12px 0}
    .input-row{display:flex;gap:10px;margin-top:10px}
    .input-row input{flex:1;padding:14px 16px;border-radius:12px;border:none;background:#222;color:#fff;outline:none}
    .vip-group{margin-top:24px}
    .vip-title{font-size:16px;margin-bottom:12px}
    .vip-item{background:#222;border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer}
    .vip-item:active{background:#333}
    .vip-name{font-weight:bold}
    .vip-price{color:#ff4080}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">BlindTouch</div>
      <div class="tip">匿名随机聊天 · 遇见有趣的人</div>
    </div>

    <div class="status" id="status">未匹配</div>
    <div class="status" id="left">免费次数：3</div>

    <button class="btn" id="match">开始匹配</button>
    <button class="btn" id="leave" disabled>结束聊天</button>

    <div class="chat-box" id="chat"></div>

    <div class="input-row">
      <input id="msg" placeholder="输入消息..." disabled>
      <button class="btn" id="send" disabled>发送</button>
    </div>

    <div class="vip-group">
      <div class="vip-title">💎 解锁无限匹配</div>
      <div class="vip-item" data-price="5"><div class="vip-name">1天会员</div><div class="vip-price">¥5</div></div>
      <div class="vip-item" data-price="15"><div class="vip-name">7天会员</div><div class="vip-price">¥15</div></div>
      <div class="vip-item" data-price="30"><div class="vip-name">30天会员</div><div class="vip-price">¥30</div></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const userId = socket.id;
    let matching = false;

    const status = document.getElementById('status');
    const left = document.getElementById('left');
    const match = document.getElementById('match');
    const leave = document.getElementById('leave');
    const chat = document.getElementById('chat');
    const msg = document.getElementById('msg');
    const send = document.getElementById('send');

    async function loadUser(){
      let res = await fetch('/user-auth?userId='+userId);
      let data = await res.json();
      left.innerText = `免费次数：${data.freeToday} ${data.isVip ? '（已开通会员）' : ''}`;
    }
    loadUser();

    match.onclick = () => {
      if(matching) return;
      matching = true;
      match.disabled = true;
      socket.emit('start_match');
    };

    leave.onclick = () => {
      socket.emit('leave_chat');
      reset();
    };

    send.onclick = () => {
      let t = msg.value.trim();
      if(!t) return;
      socket.emit('send_message', t);
      addMsg(t, true);
      msg.value = '';
    };

    function addMsg(text, me){
      let d = document.createElement('div');
      d.style.margin = '8px 0';
      d.style.padding = '10px 14px';
      d.style.borderRadius = '12px';
      d.style.maxWidth = '75%';
      d.style.wordBreak='break-word';
      if(me){
        d.style.background='#ff4080';
        d.style.color='#fff';
        d.style.marginLeft='auto';
      }else{
        d.style.background='#2a2a2a';
        d.style.color='#fff';
      }
      d.innerText = text;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
    }

    function reset(){
      matching = false;
      match.disabled = false;
      leave.disabled = true;
      msg.disabled = true;
      send.disabled = true;
      chat.innerHTML = '';
      status.innerText = '未匹配';
      loadUser();
    }

    socket.on('waiting', ()=> status.innerText='正在匹配...');
    socket.on('match_error', (t)=>{alert(t);reset();});
    socket.on('match_success', ()=>{
      status.innerText='匹配成功';
      leave.disabled=false;
      msg.disabled=false;
      send.disabled=false;
    });
    socket.on('new_message', (o)=> addMsg(o.msg, false));
    socket.on('chat_end', ()=>{alert('对方已离开');reset();});
    socket.on('user_leave', ()=>{alert('对方断开');reset();});
    socket.on('left_count', (n)=> left.innerText='免费次数：'+n);

    // 支付逻辑
    document.querySelectorAll('.vip-item').forEach(item=>{
      item.onclick = async ()=>{
        let price = item.dataset.price;
        let res = await fetch('/create-order', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({userId, price})
        });
        let data = await res.json();
        let f = document.createElement('form');
        f.method='POST';
        f.action=data.formUrl;
        f.target='_blank';
        for(let k in data.formData){
          let i = document.createElement('input');
          i.type='hidden';
          i.name=k;
          i.value=data.formData[k];
          f.appendChild(i);
        }
        document.body.appendChild(f);
        f.submit();
        setTimeout(()=>f.remove(),500);
      }
    });
  </script>
</body>
</html>
