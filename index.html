<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Touch</title>
    <style>
        * { box-sizing: border-box; margin:0; padding:0; }
        body { font-family:"Microsoft YaHei"; max-width:800px; margin:0 auto; padding:20px; background:#1E1E2E; color:#fff; position: relative; }
        h1 { text-align:center; margin-bottom:10px; font-size:28px; color:#fff; }
        #status { text-align:center; margin-bottom:15px; color:#28a745; }
        #chat { height:450px; border:1px solid #444; padding:15px; overflow-y:auto; background:#2D2D3F; border-radius:8px; margin-bottom:15px; }
        .message { margin-bottom:12px; display:flex; }
        .mine { justify-content:flex-end; }
        .other { justify-content:flex-start; }
        .bubble { max-width:70%; padding:10px 14px; border-radius:18px; word-wrap:break-word; font-size:15px; }
        .mine .bubble { background:#007bff; color:white; }
        .other .bubble { background:#444; color:#fff; }
        .input-area { display:flex; gap:10px; margin-bottom:15px; }
        #message { flex:1; padding:12px; border-radius:20px; border:1px solid #444; background:#2D2D3F; color:#fff; outline:none; }
        #send { padding:12px 24px; border:none; border-radius:20px; background:#ccc; color:white; cursor:not-allowed; }
        #send.enabled { background:#007bff; cursor:pointer; }
        .btn-group { display:flex; justify-content:center; gap:15px; margin-bottom:10px; }
        button { padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-size:14px; }
        #matchBtn { background:#007bff; color:#fff; }
        #leaveBtn { background:#dc3545; color:#fff; display:none; }
        #matchStatus { margin:10px 0; padding:12px; border-radius:6px; font-size:15px; text-align:center; display:none; }
        .toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.8); color:white; padding:12px 24px; border-radius:8px; opacity:0; transition:opacity 0.3s; z-index:1000; }
        .toast.show { opacity:1; }

        /* 充值按钮 —— 永久常驻右侧 */
        #payBtn {
            position: fixed;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff5722;
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 12px 16px;
            font-size: 14px;
            display: block !important;
            cursor: pointer;
            z-index: 99;
            box-shadow: 0 0 10px rgba(255,87,34,0.5);
        }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; }
        .modal-content { background:#2D2D3F; padding:25px; border-radius:12px; max-width:400px; width:90%; position:relative; color:#fff; }
        .close-modal { position:absolute; top:10px; right:15px; font-size:22px; cursor:pointer; color:#fff; }
        .package { border:1px solid #555; border-radius:8px; padding:14px; margin:10px 0; cursor:pointer; background:#3D3D5F; text-align:center; }
        .package:hover { background:#50507A; }
    </style>
</head>
<body>

<button id="payBtn">开通会员</button>
<h1>Blind Touch</h1>
<div id="status">✅ 待匹配</div>
<div id="matchStatus"></div>
<div id="chat"></div>

<div class="input-area">
    <input type="text" id="message" placeholder="输入消息...">
    <button id="send">发送</button>
</div>

<div class="btn-group">
    <button id="matchBtn">加载中...</button>
    <button id="leaveBtn">离开对话</button>
</div>
<div id="toast" class="toast"></div>

<!-- 支付弹窗 -->
<div id="payModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2 style="text-align:center; margin-bottom:20px;">解锁无限聊天</h2>
        <div class="package" data-price="5"><strong>5元</strong><br>当日无限</div>
        <div class="package" data-price="15"><strong>15元</strong><br>7天无限</div>
        <div class="package" data-price="30"><strong>30元</strong><br>30天无限</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const userId = socket.id;
let isMatching = false;
let isVip = false;

const matchBtn = document.getElementById('matchBtn');
const leaveBtn = document.getElementById('leaveBtn');
const sendBtn = document.getElementById('send');
const payBtn = document.getElementById('payBtn');
const payModal = document.getElementById('payModal');

function reset() {
    document.getElementById('chat').innerHTML = '';
    sendBtn.classList.remove('enabled');
    sendBtn.disabled = true;
    leaveBtn.style.display = 'none';
    document.getElementById('status').innerText = "✅ 待匹配";
}

async function loadUser() {
    let res = await fetch('/user-auth?userId='+userId);
    let d = await res.json();
    isVip = d.isVip;
    if (isVip) matchBtn.innerText = "开始匹配（无限）";
    else matchBtn.innerText = `开始匹配（剩余${d.freeToday}次）`;
}

payBtn.onclick = () => payModal.style.display = 'flex';
document.querySelector('.close-modal').onclick = () => payModal.style.display = 'none';

// 支付 —— 100% 修复版
document.querySelectorAll('.package').forEach(p => {
    p.onclick = async () => {
        let price = p.dataset.price;
        let res = await fetch('/create-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, price })
        });
        let d = await res.json();
        if (d.payUrl) location.href = d.payUrl;
    }
});

matchBtn.onclick = () => {
    if (!isMatching) { socket.emit('start_match'); isMatching = true; matchBtn.innerText = "取消匹配"; }
    else { socket.emit('cancel_match'); isMatching = false; matchBtn.innerText = "开始匹配"; }
};

leaveBtn.onclick = () => socket.emit('leave_chat');
sendBtn.onclick = () => {
    let msg = document.getElementById('message').value.trim();
    if (msg) { socket.emit('send_message', msg); document.getElementById('message').value = ''; }
};

socket.on('match_success', () => {
    isMatching = false; matchBtn.innerText = "开始匹配";
    sendBtn.classList.add('enabled'); sendBtn.disabled = false;
    leaveBtn.style.display = "inline-block";
    document.getElementById('status').innerText = "✅ 已连接";
});

socket.on('waiting', () => document.getElementById('status').innerText = "⏳ 匹配中...");
socket.on('match_canceled', () => { isMatching = false; matchBtn.innerText = "开始匹配"; });
socket.on('chat_end', () => reset());
socket.on('user_leave', () => reset());
socket.on('new_message', (d) => {
    let div = document.createElement('div');
    div.className = d.user === userId ? 'message mine' : 'message other';
    let b = document.createElement('div');
    b.className = 'bubble';
    b.innerText = d.msg;
    div.appendChild(b);
    document.getElementById('chat').appendChild(div);
    document.getElementById('chat').scrollTop = 99999;
});
socket.on('left_count', n => { if (!isVip) matchBtn.innerText = `开始匹配（剩余${n}次）`; });
socket.on('match_error', msg => alert(msg));

loadUser();
</script>
</body>
</html>
