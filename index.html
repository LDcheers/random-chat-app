<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机陌生人聊天</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #ebebeb;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }
        #status {
            text-align: center;
            margin-bottom: 15px;
            color: #28a745;
        }
        #chat {
            height: 450px;
            border: 1px solid #ddd;
            padding: 15px;
            overflow-y: auto;
            background: #fff;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
        }
        .mine {
            justify-content: flex-end;
        }
        .other {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }
        .mine .bubble {
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .other .bubble {
            background: #f1f1f1;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .msgCount {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }
        .other .msgCount {
            text-align: left;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        #message {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 15px;
        }
        #send {
            padding: 12px 24px;
            border: none;
            border-radius: 20px;
            background: #ccc;
            color: white;
            cursor: not-allowed;
        }
        #send.enabled {
            background: #007bff;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-group button {
            padding: 12px 24px;
            border: none;
            border-radius: 20px;
            background: #007bff;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }
        #leaveBtn {
            background: #dc3545;
            display: none;
        }

        /* 匹配状态提示 */
        #matchStatus {
            margin: 10px 0;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            text-align: center;
            display: none;
        }

        /* 离开对话提示（1秒渐变消失） */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }

        /* 付费弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }
        .package {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            cursor: pointer;
        }
        .package:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>

    <h1>随机陌生人聊天</h1>
    <div id="status">✅ 待匹配</div>
    <div id="matchStatus"></div>
    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="message" placeholder="输入消息...">
        <button id="send">发送</button>
    </div>

    <div class="btn-group">
        <button id="matchBtn">开始匹配（今日剩余3次）</button>
        <button id="leaveBtn">离开对话</button>
        <button id="payBtn">付费解锁</button>
    </div>

    <!-- 离开对话提示 -->
    <div id="toast" class="toast"></div>

    <!-- 付费套餐弹窗 -->
    <div id="payModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 style="text-align:center;margin-bottom:15px">选择付费套餐</h2>
            <div class="package" data-price="9.9">
                <strong>9.9元</strong> - 当日无限匹配
            </div>
            <div class="package" data-price="29.9">
                <strong>29.9元</strong> - 7天无限匹配
            </div>
            <div class="package" data-price="99">
                <strong>99元</strong> - 永久无限匹配
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socketUrl = "wss://random-chat-app-production-a19a.up.railway.app";
        const socket = io(socketUrl);

        let myMsgCount = 0;
        let otherMsgCount = 0;
        let isMatching = false;

        const matchBtn = document.getElementById('matchBtn');
        const leaveBtn = document.getElementById('leaveBtn');
        const sendBtn = document.getElementById('send');
        const toast = document.getElementById('toast');
        const payModal = document.getElementById('payModal');

        // 重置到原始待匹配界面
        function resetToInitialState() {
            myMsgCount = 0;
            otherMsgCount = 0;
            document.getElementById('chat').innerHTML = '';
            document.getElementById('message').value = '';
            sendBtn.classList.remove('enabled');
            sendBtn.disabled = true;
            leaveBtn.style.display = 'none';
            document.getElementById('matchStatus').style.display = 'none';
            document.getElementById('status').innerText = "✅ 待匹配";
            document.getElementById('status').style.color = "#28a745";
        }

        // 显示1秒消失的提示
        function showToast(text) {
            toast.innerText = text;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1000);
        }

        // 剩余次数更新
        socket.on('left_count', (n) => {
            matchBtn.innerText = `开始匹配（今日剩余${n}次）`;
        });

        // 正在匹配
        socket.on('waiting', () => {
            isMatching = true;
            matchBtn.innerText = "取消匹配";
            let st = document.getElementById('matchStatus');
            st.style.display = 'block';
            st.style.background = '#fff3cd';
            st.style.color = '#856404';
            st.innerText = '⏳ 正在匹配中，可以随时取消';
        });

        // 匹配成功
        socket.on('match_success', () => {
            isMatching = false;
            matchBtn.innerText = "开始匹配";
            let st = document.getElementById('matchStatus');
            st.style.display = 'block';
            st.style.background = '#d4edda';
            st.style.color = '#155724';
            st.innerText = '✅ 匹配成功！开始聊天';
            sendBtn.classList.add('enabled');
            sendBtn.disabled = false;
            leaveBtn.style.display = 'inline-block';
            document.getElementById('status').innerText = "✅ 对方在线";
            document.getElementById('status').style.color = "#28a745";
        });

        // 匹配取消
        socket.on('match_canceled', () => {
            isMatching = false;
            matchBtn.innerText = "开始匹配";
            resetToInitialState();
        });

        // 匹配错误
        socket.on('match_error', (msg) => {
            isMatching = false;
            matchBtn.innerText = "开始匹配";
            let st = document.getElementById('matchStatus');
            st.style.display = 'block';
            st.style.background = '#f8d7da';
            st.style.color = '#721c24';
            st.innerText = '❌ ' + msg;
        });

        // 聊天结束（对方离开）
        socket.on('chat_end', (msg) => {
            showToast(msg);
            setTimeout(resetToInitialState, 1000);
        });

        // 对方离线
        socket.on('user_leave', () => {
            showToast("对方已离开对话");
            setTimeout(resetToInitialState, 1000);
        });

        // 收到消息
        socket.on('new_message', (data) => {
            let chat = document.getElementById('chat');
            let isMe = data.user === socket.id;

            let msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isMe ? 'mine' : 'other');

            let bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = data.msg;

            let count = document.createElement('div');
            count.className = 'msgCount';

            if (isMe) {
                myMsgCount++;
                count.innerText = `我 · 第 ${myMsgCount} 条`;
            } else {
                otherMsgCount++;
                count.innerText = `对方 · 第 ${otherMsgCount} 条`;
            }

            msgDiv.appendChild(bubble);
            msgDiv.appendChild(count);
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        });

        // 发送消息
        sendBtn.onclick = function () {
            let msg = document.getElementById('message').value.trim();
            if (msg && sendBtn.classList.contains('enabled')) {
                socket.emit('send_message', msg);
                document.getElementById('message').value = '';
            }
        };

        // 匹配/取消匹配按钮
        matchBtn.onclick = function () {
            if (!isMatching) {
                resetToInitialState();
                socket.emit('start_match');
            } else {
                socket.emit('cancel_match');
            }
        };

        // 主动离开对话
        leaveBtn.onclick = function () {
            socket.emit('leave_chat');
            showToast("你已离开对话");
            setTimeout(resetToInitialState, 1000);
        };

        // 付费弹窗
        document.getElementById('payBtn').onclick = function () {
            payModal.style.display = 'flex';
        };
        document.querySelector('.close-modal').onclick = function () {
            payModal.style.display = 'none';
        };
        document.querySelectorAll('.package').forEach(pkg => {
            pkg.onclick = function () {
                let price = this.getAttribute('data-price');
                alert(`你选择了 ${price} 元套餐，后续对接支付即可`);
                payModal.style.display = 'none';
            };
        });
    </script>
</body>
</html>
