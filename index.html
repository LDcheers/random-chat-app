<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机聊天</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #ebebeb;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 22px;
        }
        #status {
            text-align: center;
            margin-bottom: 10px;
            color: #666;
        }
        #matchStatus {
            margin: 15px 0;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            text-align: center;
            display: none;
        }

        /* 聊天框样式 */
        #chat {
            height: 450px;
            border: 1px solid #ddd;
            padding: 15px;
            overflow-y: auto;
            background: #fff;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        /* 气泡样式 */
        .message {
            margin-bottom: 12px;
            display: flex;
        }
        .mine {
            justify-content: flex-end;
        }
        .other {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }
        .mine .bubble {
            background: #00C260;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .other .bubble {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }

        /* 计数 */
        .msgCount {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }
        .other .msgCount {
            text-align: left;
        }

        /* 输入框 */
        .input-area {
            display: flex;
            gap: 8px;
        }
        #message {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #ddd;
            outline: none;
        }
        button {
            padding: 12px 16px;
            border: none;
            border-radius: 20px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-group {
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>随机陌生人聊天</h1>

    <div id="matchStatus"></div>
    <div id="status">已在线</div>

    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="message" placeholder="输入消息...">
        <button id="send" disabled>发送</button>
    </div>

    <div class="btn-group">
        <button id="match">开始匹配</button>
        <button id="payBtn">付费解锁</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socketUrl = "wss://random-chat-app-production-a19a.up.railway.app";
        const socket = io(socketUrl);

        // 消息计数
        let myMsgCount = 0;
        let otherMsgCount = 0;

        // 在线状态
        let isOtherOnline = false;

        // ==============================================
        // 匹配状态
        // ==============================================
        socket.on('waiting', () => {
            let s = document.getElementById('matchStatus');
            s.style.display = 'block';
            s.style.background = '#fff3cd';
            s.style.color = '#856404';
            s.innerText = '⏳ 正在匹配中...';
        });

        socket.on('match_success', () => {
            let s = document.getElementById('matchStatus');
            s.style.display = 'block';
            s.style.background = '#d4edda';
            s.style.color = '#155724';
            s.innerText = '✅ 匹配成功！开始聊天';
            document.getElementById('send').disabled = false;
            isOtherOnline = true;
            updateOnlineStatus();
        });

        socket.on('match_error', (msg) => {
            let s = document.getElementById('matchStatus');
            s.style.display = 'block';
            s.style.background = '#f8d7da';
            s.style.color: '#721c24';
            s.innerText = '❌ ' + msg;
        });

        socket.on('chat_end', (msg) => {
            let s = document.getElementById('matchStatus');
            s.style.display = 'block';
            s.style.background: '#f8d7da';
            s.style.color: '#721c24';
            s.innerText = '❌ ' + msg;
            document.getElementById('send').disabled = true;
        });

        // ==============================================
        // 对方在线状态
        // ==============================================
        socket.on('user_leave', () => {
            isOtherOnline = false;
            updateOnlineStatus();
        });

        socket.on('user_rejoin', () => {
            isOtherOnline = true;
            updateOnlineStatus();
        });

        function updateOnlineStatus() {
            const status = document.getElementById('status');
            if (isOtherOnline) {
                status.innerText = "✅ 对方在线";
                status.style.color = "#00C260";
            } else {
                status.innerText = "⚠️ 对方已离线";
                status.style.color: "#ff4444";
            }
        }

        // ==============================================
        // 接收消息（左右气泡 + 计数）
        // ==============================================
        socket.on('new_message', (data) => {
            const chat = document.getElementById('chat');
            const isMe = data.user === socket.id;

            let msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isMe ? 'mine' : 'other');

            let bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = data.msg;

            let count = document.createElement('div');
            count.className = 'msgCount';

            if (isMe) {
                myMsgCount++;
                count.innerText = `我 · 第 ${myMsgCount} 条`;
            } else {
                otherMsgCount++;
                count.innerText = `对方 · 第 ${otherMsgCount} 条`;
            }

            msgDiv.appendChild(bubble);
            msgDiv.appendChild(count);
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        });

        // ==============================================
        // 发送消息
        // ==============================================
        document.getElementById('send').onclick = function () {
            const msg = document.getElementById('message').value.trim();
            if (!msg) return;
            socket.emit('send_message', msg);
            document.getElementById('message').value = '';
        };

        document.getElementById('match').onclick = function () {
            myMsgCount = 0;
            otherMsgCount = 0;
            document.getElementById('chat').innerHTML = '';
            socket.emit('start_match');
        };
    </script>
</body>
</html>
