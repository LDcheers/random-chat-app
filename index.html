<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlindTouch</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    body{background:#111;color:#fff;padding:20px}
    .container{max-width:420px;margin:0 auto;position:relative}
    .header{text-align:center;margin:30px 0}
    .logo{font-size:28px;font-weight:bold;color:#fff;margin-bottom:10px}
    .btn{width:100%;padding:16px;border-radius:12px;border:none;background:#ff4080;color:#fff;font-size:16px;font-weight:500;margin:10px 0;cursor:pointer}
    .btn:disabled{background:#444;color:#777}
    .status{text-align:center;color:#aaa;margin:12px 0;font-size:15px}
    .chat-box{height:460px;background:#1a1a1a;border-radius:12px;padding:14px;overflow-y:auto;margin:12px 0}
    .input-row{display:flex;gap:10px;margin-top:10px}
    .input-row input{flex:1;padding:14px 16px;border-radius:12px;border:none;background:#222;color:#fff;outline:none}
    .vip-group{margin-top:24px}
    .vip-title{font-size:16px;margin-bottom:12px}
    .vip-item{background:#222;border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer}
    .vip-item:active{background:#333}
    .vip-name{font-weight:bold}
    .vip-price{color:#ff4080}
    .mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:999}
    .login-box{width:90%;max-width:360px;background:#1e1e1e;border-radius:16px;padding:24px}
    .login-box h3{text-align:center;margin-bottom:20px;font-size:20px}
    .login-box input{width:100%;padding:14px;border-radius:10px;border:none;background:#2a2a2a;color:#fff;margin-bottom:14px;outline:none}
    .switch-txt{text-align:center;margin-top:15px;color:#888}
    .switch-txt span{color:#ff4080;cursor:pointer}
    .hide{display:none !important}

    /* 聊天序号样式 */
    .chat-number{
      font-size:11px;
      color:#aaa;
      margin-bottom:3px;
    }

    /* 右侧充值菜单 */
    .vip-menu{
      position:absolute;
      top:10px;
      right:0;
      z-index:888;
    }
    .vip-dropdown{
      display:none;
      position:absolute;
      top:40px;
      right:0;
      width:180px;
      background:#222;
      border-radius:12px;
      padding:10px;
    }
    .vip-menu-btn{
      background:#ff4080;
      color:#fff;
      border:none;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      font-size:14px;
    }
    .vip-menu.show .vip-dropdown{
      display:block;
    }
  </style>
</head>
<body>

<div class="mask" id="mask">
  <div class="login-box">
    <h3 id="winTitle">登录</h3>
    <input type="text" id="username" placeholder="请输入账号">
    <input type="password" id="pwd" placeholder="请输入密码">
    <button class="btn" id="submitBtn">立即登录</button>
    <div class="switch-txt" id="switchTxt">没有账号？<span id="switchBtn">去注册</span></div>
  </div>
</div>

<div class="container" id="mainPage" class="hide">
  <div class="header">
    <div class="logo">BlindTouch</div>
  </div>

  <!-- 右侧充值菜单 -->
  <div class="vip-menu" id="vipMenu">
    <button class="vip-menu-btn" id="vipBtn">💎 充值</button>
    <div class="vip-dropdown">
      <div class="vip-item" data-price="5"><div class="vip-name">1天会员</div><div class="vip-price">¥5</div></div>
      <div class="vip-item" data-price="15"><div class="vip-name">7天会员</div><div class="vip-price">¥15</div></div>
      <div class="vip-item" data-price="30"><div class="vip-name">30天会员</div><div class="vip-price">¥30</div></div>
    </div>
  </div>

  <div class="status" id="status">未匹配</div>
  <div class="status" id="left">免费次数：3</div>

  <button class="btn" id="match">开始匹配</button>
  <button class="btn" id="leave" disabled>结束聊天</button>

  <div class="chat-box" id="chat"></div>

  <div class="input-row">
    <input id="msg" placeholder="输入消息..." disabled>
    <button class="btn" id="send" disabled>发送</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let nowMode = "login";
  let loginUsername = "";
  let matching = false;
  let msgSeq = 0;

  const mask = document.getElementById('mask');
  const mainPage = document.getElementById('mainPage');
  const winTitle = document.getElementById('winTitle');
  const submitBtn = document.getElementById('submitBtn');
  const switchBtn = document.getElementById('switchBtn');
  const usernameInp = document.getElementById('username');
  const pwdInp = document.getElementById('pwd');

  const status = document.getElementById('status');
  const left = document.getElementById('left');
  const match = document.getElementById('match');
  const leave = document.getElementById('leave');
  const chat = document.getElementById('chat');
  const msg = document.getElementById('msg');
  const send = document.getElementById('send');

  const vipMenu = document.getElementById('vipMenu');
  const vipBtn = document.getElementById('vipBtn');
  
  vipBtn.onclick = () => {
    vipMenu.classList.toggle('show');
  };

  window.onload = function(){
    let user = localStorage.getItem('btUser');
    if(user){ enterMain(JSON.parse(user).username); }
  };

  switchBtn.onclick = function(){
    if(nowMode === "login"){
      nowMode = "reg"; winTitle.innerText = "注册账号"; submitBtn.innerText = "立即注册";
      switchTxt.innerHTML = "已有账号？<span id='switchBtn'>去登录</span>";
    }else{
      nowMode = "login"; winTitle.innerText = "登录"; submitBtn.innerText = "立即登录";
      switchTxt.innerHTML = "没有账号？<span id='switchBtn'>去注册</span>";
    }
    document.getElementById('switchBtn').onclick = switchBtn.onclick;
  };

  submitBtn.onclick = async function(){
    let un = usernameInp.value.trim(), pd = pwdInp.value.trim();
    if(!un||!pd){alert('不能为空');return}
    if(nowMode==="reg"){
      let d=await(await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:un,password:pd})})).json();
      if(d.code!==0){alert(d.msg);return}
      alert('注册成功，请登录'); nowMode="login"; winTitle.innerText="登录"; submitBtn.innerText="立即登录";
    }else{
      let d=await(await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:un,password:pd})})).json();
      if(d.code!==0){alert(d.msg);return}
      loginUsername=un; localStorage.setItem('btUser',JSON.stringify({username:un}));
      enterMain(un);
    }
  };

  async function enterMain(un){
    mask.classList.add('hide'); mainPage.classList.remove('hide');
    let data=await(await fetch('/getAccountUser?username='+un)).json();
    let isVip=data.expireTime>Date.now();
    left.innerText=`免费次数：${data.freeToday} ${isVip?'（已开通会员）':''}`;
  }

  match.onclick=()=>{if(matching)return;matching=true;match.disabled=true;socket.emit('start_match');msgSeq=0;};
  leave.onclick=()=>{socket.emit('leave_chat');reset();};

  send.onclick=()=>{
    let t=msg.value.trim();if(!t)return;
    msgSeq++;
    addMsg(t,true, msgSeq);
    socket.emit('send_message',{text:t, seq:msgSeq});
    msg.value='';
  };

  // ✅ 消息带序号
  function addMsg(text,me,seq){
    let wrap = document.createElement('div');
    wrap.style.margin = '8px 0';

    let num = document.createElement('div');
    num.className = 'chat-number';
    num.innerText = '第' + seq + '句';

    let bubble = document.createElement('div');
    bubble.style.padding='10px 14px';bubble.style.borderRadius='12px';bubble.style.maxWidth='75%';bubble.style.wordBreak='break-word';
    if(me){bubble.style.background='#ff4080';bubble.style.color='#fff';bubble.style.marginLeft='auto';}
    else{bubble.style.background='#2a2a2a';bubble.style.color='#fff';}
    bubble.innerText=text;

    wrap.appendChild(num);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop=chat.scrollHeight;
  }

  function reset(){
    matching=false;match.disabled=false;leave.disabled=true;msg.disabled=true;send.disabled=true;
    chat.innerHTML='';status.innerText='未匹配';msgSeq=0;
  }

  socket.on('waiting',()=>status.innerText='正在匹配...');
  socket.on('match_error',(t)=>{alert(t);reset();});
  socket.on('match_success',()=>{status.innerText='匹配成功';leave.disabled=false;msg.disabled=false;send.disabled=false;});
  socket.on('new_message',(o)=>{
    msgSeq++;
    addMsg(o.msg,false,msgSeq);
  });
  socket.on('chat_end',()=>{alert('对方已离开');reset();});
  socket.on('user_leave',()=>{alert('对方断开');reset();});
  socket.on('left_count',(n)=>left.innerText='免费次数：'+n);

  // 右侧菜单充值
  document.querySelectorAll('.vip-item').forEach(item=>{
    item.onclick=async()=>{
      let price=item.dataset.price;
      let data=await(await fetch('/create-order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:loginUsername,price})})).json();
      let f=document.createElement('form');f.method='POST';f.action=data.formUrl;f.target='_blank';
      for(let k in data.formData){let i=document.createElement('input');i.type='hidden';i.name=k;i.value=data.formData[k];f.appendChild(i);}
      document.body.appendChild(f);f.submit();setTimeout(()=>f.remove(),500);
      vipMenu.classList.remove('show');
    };
  });
</script>
</body>
</html>
