<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlindTouch</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    body{background:#111;color:#fff;padding:16px;line-height:1.5}
    .container{max-width:420px;margin:0 auto;position:relative}
    .header{text-align:center;margin:24px 0 20px}
    .logo{font-size:28px;font-weight:700;color:#fff;letter-spacing:2px}

    /* 按钮美化 保留原色+微动效 */
    .btn{width:100%;padding:15px;border-radius:16px;border:none;background:#ff4080;color:#fff;font-size:16px;font-weight:500;margin:10px 0;cursor:pointer;transition:all 0.2s ease;box-shadow:0 4px 12px rgba(255,64,128,0.15)}
    .btn:active{transform:scale(0.98);opacity:0.92}
    .btn:disabled{background:#333;color:#667;box-shadow:none;transform:none}

    .status{text-align:center;color:#aaa;margin:10px 0;font-size:15px}
    .chat-box{height:460px;background:#1a1a1a;border-radius:18px;padding:16px;overflow-y:auto;margin:12px 0;box-shadow:inset 0 0 10px rgba(0,0,0,0.3)}
    .chat-box::-webkit-scrollbar{width:4px}
    .chat-box::-webkit-scrollbar-thumb{background:#333;border-radius:4px}

    .input-row{display:flex;gap:10px;margin-top:12px}
    .input-row input{flex:1;padding:14px 16px;border-radius:16px;border:none;background:#222;color:#fff;outline:none;transition:all 0.2s ease}
    .input-row input:focus{background:#252525;box-shadow:0 0 0 2px rgba(255,64,128,0.2)}

    /* 右侧快捷联系方式栏 */
    .right-bar{position:fixed;top:50%;right:10px;transform:translateY(-50%);width:140px;background:#1e1e1e;border-radius:16px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
    .right-bar h4{text-align:center;margin-bottom:10px;font-size:14px;color:#ddd}
    .right-bar textarea{width:100px;height:100px;background:#2a2a2a;border:none;border-radius:10px;color:#fff;padding:8px;outline:none;resize:none;font-size:13px}
    .bar-btn{width:100px;padding:6px;border-radius:8px;border:none;margin-top:8px;font-size:13px;background:#ff4080;color:#fff;cursor:pointer}
    .bar-btn:active{opacity:0.9}

    .vip-group{margin-top:24px}
    .vip-title{font-size:16px;margin-bottom:12px;color:#ddd}
    .vip-item{background:#222;border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all 0.2s ease}
    .vip-item:active{background:#2a2a2a}
    .vip-name{font-weight:500;margin-bottom:4px}
    .vip-price{color:#ff4080;font-weight:500}

    /* 聊天序号样式 */
    .chat-number{font-size:11px;color:#999;margin-bottom:4px}

    /* 右侧充值下拉菜单美化 */
    .vip-menu{position:absolute;top:10px;right:0;z-index:888}
    .vip-dropdown{display:none;position:absolute;top:42px;right:0;width:180px;background:#222;border-radius:16px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
    .vip-menu-btn{background:#ff4080;color:#fff;border:none;padding:8px 14px;border-radius:12px;cursor:pointer;font-size:14px;transition:all 0.2s ease}
    .vip-menu-btn:active{transform:scale(0.96)}
    .vip-menu.show .vip-dropdown{display:block}

    /* 登录弹窗美化 */
    .mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:999}
    .login-box{width:90%;max-width:360px;background:#1e1e1e;border-radius:20px;padding:28px;box-shadow:0 10px 40px rgba(0,0,0,0.5)}
    .login-box h3{text-align:center;margin-bottom:24px;font-size:20px;font-weight:600}
    .login-box input{width:100%;padding:14px;border-radius:14px;border:none;background:#2a2a2a;color:#fff;margin-bottom:16px;outline:none;transition:all 0.2s ease}
    .login-box input:focus{background:#2f2f2f;box-shadow:0 0 0 2px rgba(255,64,128,0.2)}
    .switch-txt{text-align:center;margin-top:18px;color:#888;font-size:14px}
    .switch-txt span{color:#ff4080;cursor:pointer}
    .hide{display:none !important}

    /* 联系信息按钮 */
    .send-contact{padding:14px 10px;border-radius:16px;border:none;background:#2288ff;color:#fff;font-size:14px;cursor:pointer}
    .send-contact:disabled{background:#334;cursor:not-allowed}
  </style>
</head>
<body>

<!-- 右侧快捷联系方式栏 -->
<div class="right-bar">
  <h4>我的联系方式</h4>
  <textarea id="contactTxt" placeholder="输入微信/QQ/手机号"></textarea>
  <button class="bar-btn" id="saveContact">保存</button>
  <button class="bar-btn" id="clearContact" style="background:#444">清空</button>
</div>

<div class="mask" id="mask">
  <div class="login-box">
    <h3 id="winTitle">登录</h3>
    <input type="text" id="username" placeholder="请输入账号">
    <input type="password" id="pwd" placeholder="请输入密码">
    <button class="btn" id="submitBtn">立即登录</button>
    <div class="switch-txt" id="switchTxt">没有账号？<span id="switchBtn">去注册</span></div>
  </div>
</div>

<div class="container" id="mainPage" class="hide">
  <div class="header">
    <div class="logo">BlindTouch</div>
  </div>

  <div class="vip-menu" id="vipMenu">
    <button class="vip-menu-btn" id="vipBtn">💎 充值</button>
    <div class="vip-dropdown">
      <div class="vip-item" data-price="5"><div class="vip-name">1天会员</div><div class="vip-price">¥5</div></div>
      <div class="vip-item" data-price="15"><div class="vip-name">7天会员</div><div class="vip-price">¥15</div></div>
      <div class="vip-item" data-price="30"><div class="vip-name">30天会员</div><div class="vip-price">¥30</div></div>
    </div>
  </div>

  <div class="status" id="status">未匹配</div>
  <div class="status" id="left">免费次数：3</div>

  <button class="btn" id="match">开始匹配</button>
  <button class="btn" id="leave" disabled>结束聊天</button>

  <div class="chat-box" id="chat"></div>

  <div class="input-row">
    <input id="msg" placeholder="输入消息..." disabled>
    <button class="btn" id="send" disabled>发送</button>
    <button class="send-contact" id="sendContact" disabled>发送联系方式</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let nowMode = "login";
  let loginUsername = "";
  let matching = false;
  let msgSeq = 0;
  const NEED_MIN = 5; // 满5句才能发联系方式

  const mask = document.getElementById('mask');
  const mainPage = document.getElementById('mainPage');
  const winTitle = document.getElementById('winTitle');
  const submitBtn = document.getElementById('submitBtn');
  const switchBtn = document.getElementById('switchBtn');
  const usernameInp = document.getElementById('username');
  const pwdInp = document.getElementById('pwd');

  const status = document.getElementById('status');
  const left = document.getElementById('left');
  const match = document.getElementById('match');
  const leave = document.getElementById('leave');
  const chat = document.getElementById('chat');
  const msg = document.getElementById('msg');
  const send = document.getElementById('send');
  const sendContact = document.getElementById('sendContact');

  // 联系方式栏
  const contactTxt = document.getElementById('contactTxt');
  const saveContact = document.getElementById('saveContact');
  const clearContact = document.getElementById('clearContact');

  const vipMenu = document.getElementById('vipMenu');
  const vipBtn = document.getElementById('vipBtn');
  
  vipBtn.onclick = () => {
    vipMenu.classList.toggle('show');
  };

  // 点击页面空白关闭充值下拉
  document.addEventListener('click',(e)=>{
    if(!vipMenu.contains(e.target)){
      vipMenu.classList.remove('show');
    }
  });

  // 读取本地保存的联系方式
  window.onload = function(){
    let user = localStorage.getItem('btUser');
    let myContact = localStorage.getItem('myContact') || '';
    contactTxt.value = myContact;

    if(user){ enterMain(JSON.parse(user).username); }
  };

  // 保存联系方式
  saveContact.onclick = () => {
    localStorage.setItem('myContact', contactTxt.value.trim());
    alert('联系方式已保存');
  };
  // 清空联系方式
  clearContact.onclick = () => {
    contactTxt.value = '';
    localStorage.removeItem('myContact');
  };

  switchBtn.onclick = function(){
    if(nowMode === "login"){
      nowMode = "reg"; winTitle.innerText = "注册账号"; submitBtn.innerText = "立即注册";
      switchTxt.innerHTML = "已有账号？<span id='switchBtn'>去登录</span>";
    }else{
      nowMode = "login"; winTitle.innerText = "登录"; submitBtn.innerText = "立即登录";
      switchTxt.innerHTML = "没有账号？<span id='switchBtn'>去注册</span>";
    }
    document.getElementById('switchBtn').onclick = switchBtn.onclick;
  };

  submitBtn.onclick = async function(){
    let un = usernameInp.value.trim(), pd = pwdInp.value.trim();
    if(!un||!pd){alert('账号和密码不能为空');return}
    if(nowMode==="reg"){
      let d=await(await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:un,password:pd})})).json();
      if(d.code!==0){alert(d.msg);return}
      alert('注册成功，请登录'); nowMode="login"; winTitle.innerText="登录"; submitBtn.innerText="立即登录";
    }else{
      let d=await(await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:un,password:pd})})).json();
      if(d.code!==0){alert(d.msg);return}
      loginUsername=un; localStorage.setItem('btUser',JSON.stringify({username:un}));
      enterMain(un);
    }
  };

  async function enterMain(un){
    mask.classList.add('hide'); mainPage.classList.remove('hide');
    let data=await(await fetch('/getAccountUser?username='+un)).json();
    let isVip=data.expireTime>Date.now();
    left.innerText=`免费次数：${data.freeToday} ${isVip?'（已开通会员）':''}`;
  }

  match.onclick=()=>{
    if(matching)return;
    matching=true;
    match.disabled=true;
    socket.emit('start_match');
    msgSeq=0;
    sendContact.disabled = true;
  };

  leave.onclick=()=>{socket.emit('leave_chat');reset();};

  send.onclick=()=>{
    let t=msg.value.trim();if(!t)return;
    msgSeq++;
    addMsg(t,true, msgSeq);
    socket.emit('send_message', t);
    msg.value='';
    checkContactBtn();
  };

  // 发送联系方式
  sendContact.onclick = () => {
    let cont = localStorage.getItem('myContact') || '';
    if(!cont){
      alert('请先在右侧填写并保存你的联系方式');
      return;
    }
    msgSeq++;
    addMsg('我的联系方式：' + cont, true, msgSeq);
    socket.emit('send_message', '我的联系方式：' + cont);
    checkContactBtn();
  };

  function checkContactBtn(){
    sendContact.disabled = msgSeq < NEED_MIN;
  }

  // 修复：消息文本赋值给气泡，解决不显示文字问题
  function addMsg(text,me,seq){
    let wrap = document.createElement('div');
    wrap.style.margin = '10px 0';

    let num = document.createElement('div');
    num.className = 'chat-number';
    num.innerText = '第' + seq + '句';

    let bubble = document.createElement('div');
    bubble.style.padding='12px 16px';
    bubble.style.borderRadius='18px';
    bubble.style.maxWidth='75%';
    bubble.style.wordBreak='break-word';
    bubble.style.boxShadow='0 2px 8px rgba(0,0,0,0.2)';
    bubble.innerText = text;

    if(me){
      bubble.style.background='#ff4080';
      bubble.style.color='#fff';
      bubble.style.marginLeft='auto';
    }else{
      bubble.style.background='#2a2a2a';
      bubble.style.color='#fff';
    }

    wrap.appendChild(num);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop=chat.scrollHeight;
  }

  function reset(){
    matching=false;match.disabled=false;leave.disabled=true;msg.disabled=true;send.disabled=true;
    chat.innerHTML='';status.innerText='未匹配';msgSeq=0;
    sendContact.disabled = true;
  }

  socket.on('waiting',()=>status.innerText='正在匹配...');
  socket.on('match_error',(t)=>{alert(t);reset();});
  socket.on('match_success',()=>{
    status.innerText='匹配成功';
    leave.disabled=false;
    msg.disabled=false;
    send.disabled=false;
    sendContact.disabled = true;
  });
  socket.on('new_message',(o)=>{
    msgSeq++;
    addMsg(o.msg,false,msgSeq);
    checkContactBtn();
  });
  socket.on('chat_end',()=>{alert('对方已离开');reset();});
  socket.on('user_leave',()=>{alert('对方断开');reset();});
  socket.on('left_count',(n)=>left.innerText='免费次数：'+n);

  document.querySelectorAll('.vip-item').forEach(item=>{
    item.onclick=async()=>{
      let price=item.dataset.price;
      let data=await(await fetch('/create-order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:loginUsername,price})})).json();
      let f=document.createElement('form');f.method='POST';f.action=data.formUrl;f.target='_blank';
      for(let k in data.formData){let i=document.createElement('input');i.type='hidden';i.name=k;i.value=data.formData[k];f.appendChild(i);}
      document.body.appendChild(f);f.submit();setTimeout(()=>f.remove(),500);
      vipMenu.classList.remove('show');
    };
  });
</script>
</body>
</html>
